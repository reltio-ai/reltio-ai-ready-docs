image: python:3.11-slim

definitions:
  steps:
    - step: &sync-docs
        name: Sync docs.md and index.md from reltio-docs-sync
        script:
          - apt-get update -qq && apt-get install -y -qq git
          - pip install requests --quiet
          - python sync.py
          - |
            git config user.email "pipelines@reltio.com"
            git config user.name "Bitbucket Pipelines"
            git add docs.md index.md
            if git diff --cached --quiet; then
              echo "No changes to commit."
            else
              git commit -m "chore: sync docs from reltio-docs-sync [skip ci]

            $(python -c "
            import datetime
            now = datetime.datetime.utcnow()
            print(f'Generated: {now.strftime(\"%Y-%m-%d %H:%M UTC\")}')
            ")"
              git push origin main
              echo "Pushed updated files."
            fi

    - step: &push-github
        name: Push docs.md and index.md to public GitHub repo
        script:
          - pip install requests --quiet
          - python github_sync.py

pipelines:
  custom:
    manual-sync:
      - step: *sync-docs

    manual-github-push:
      - step: *push-github

  branches:
    main:
      - step:
          name: Validate sync scripts
          script:
            - python -m py_compile sync.py && echo "sync.py OK"
            - python -m py_compile github_sync.py && echo "github_sync.py OK"

schedules:
  - cron: "30 5 * * 3,5"
    name: Sync and push to GitHub Wed+Fri 11:00 AM IST (05:30 UTC)
    branches:
      main:
        - step: *sync-docs
        - step: *push-github
